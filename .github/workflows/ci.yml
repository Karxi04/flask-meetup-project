name: Create Meetup Automated Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main
  
  schedule:
    - cron: "00 11 * * *"
      timezone: "Asia/Kuala_Lumpur"

permissions:
  contents: read

jobs:
  create-meetup-testing:
    name: Create Meetup Automated Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Prepare project
        uses: actions/checkout@v4

      - name: Prepare Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install testing requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Test Create Meetup
        run: |
          mkdir -p reports

          python -m pytest tests/test_create_meetup.py -v \
            --tb=short \
            --html=reports/create-meetup-test-report.html \
            --self-contained-html \
            --junitxml=reports/create-meetup-junit.xml

      - name: Save Create Meetup report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Create-Meetup-Automated-Test-Report
          path: reports/
          if-no-files-found: warn
          retention-days: 30